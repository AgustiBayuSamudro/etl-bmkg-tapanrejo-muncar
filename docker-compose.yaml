version: "3.8"

x-airflow-common: &airflow-common
  # Ganti ke 'build: .' jika ingin install Spark di dalam Airflow
  build:
    context: ./docker/airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins    
    - ./scripts:/opt/airflow/scripts
  user: "50000:0"
  networks:
    - spark-net
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:  
  postgres:
    image: postgres:13
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    container_name: postgres
    ports:
    - "5432:5432"
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 5
    networks:
      - spark-net

  redis:
    image: redis:7.0
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spark-net

  # Airflow Services
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password admin
      --firstname Admin --lastname User
      --role Admin --email admin@example.com"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  airflow-worker:
    <<: *airflow-common
    command: celery worker
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - spark-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xms256M -Xmx512M"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - spark-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - spark-net

  # Spark
  spark-master:
    build:
      context: ./docker/spark
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MODE=master
      - SPARK_SUBMIT_PARAMETERS=--packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.apache.hadoop:hadoop-aws:3.3.4
    ports:
      - "7077:7077"
      - "8081:8080"
      - "10000:10000"
    volumes:
      - ./scripts:/opt/spark/scripts
    networks:
      - spark-net

  spark-worker:
    build:
      context: ./docker/spark
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_MODE=worker
      - SPARK_SUBMIT_PARAMETERS=--packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.apache.hadoop:hadoop-aws:3.3.4
    depends_on:
      - spark-master
    networks:
      - spark-net
    deploy:
      resources:
        limits:
          memory: 1G
  
  spark-consumer:
    build:
      context: ./docker/spark
    container_name: spark-consumer
    user: root
    environment:
      - SPARK_MODE=client
    volumes:
      - /home/agusti/etl-bmkg-tapanrejo-muncar/scripts:/opt/spark/scripts      
    command: >
      spark-submit
          --master spark://spark-master:7077
          --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.apache.hadoop:hadoop-aws:3.3.4
          /opt/spark/scripts/customer/kafka_to_minio_streaming.py
    depends_on:
      - kafka
      - minio
      - spark-master
    networks:
      - spark-net
    restart: always
  
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - spark-net

  trino:
    image: trinodb/trino:435
    container_name: trino
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    ports:
      - "8088:8080" 
    volumes:
      - ./trino/catalog:/etc/trino/catalog
      - trino-data:/data
    depends_on:
      - minio
    networks:
      - spark-net

networks:
  spark-net:
    driver: bridge

volumes:
  postgres-db-volume:
  minio-data:
  trino-data:  
  zookeeper-data:
  zookeeper-log:
  kafka-data: